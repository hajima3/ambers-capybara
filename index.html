<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBER RUBIO CALDERON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #0a0a0f;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-text {
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 6px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,15,1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .nav.visible {
            opacity: 1;
        }

        .logo {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #fff;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Sections */
        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
        }

        .section-title {
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #444;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .section-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 4px;
        }

        .section:nth-child(3) .section-name {
            background: linear-gradient(135deg, #00c6ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Canvas containers */
        .canvas-wrapper {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 60vh;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.5);
            cursor: grab;
        }

        .canvas-wrapper:active {
            cursor: grabbing;
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Controls */
        .canvas-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .zoom-text {
            color: #888;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            padding: 0 10px;
            min-width: 60px;
            justify-content: center;
        }

        /* Color Modes */
        .mode-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .mode-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .mode-btn:hover {
            transform: scale(1.2);
        }

        .mode-btn.active {
            border-color: #fff;
            box-shadow: 0 0 15px currentColor;
        }

        .mode-btn.bw { background: linear-gradient(135deg, #666, #fff); }
        .mode-btn.gradient { background: linear-gradient(135deg, #667eea, #f093fb); }
        .mode-btn.warm { background: linear-gradient(135deg, #f5af19, #f12711); }
        .mode-btn.cool { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .mode-btn.matrix { background: linear-gradient(135deg, #003300, #00ff00); }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-indicator span {
            color: #444;
            font-size: 0.6rem;
            letter-spacing: 3px;
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 2px solid #444;
            border-bottom: 2px solid #444;
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Footer */
        .footer {
            padding: 40px;
            text-align: center;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* Hidden */
        .hidden-images {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 15px 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .section-name {
                font-size: 1.5rem;
            }
            
            .canvas-wrapper {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">LOADING ARTWORK</div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navigation -->
    <nav class="nav">
        <div class="logo"><span>AMBER</span> RUBIO CALDERON</div>
        <div class="nav-links">
            <a href="#section1">PORTRAIT 1</a>
            <a href="#section2">PORTRAIT 2</a>
        </div>
    </nav>

    <!-- Section 1: AMBER RUBIO CALDERON -->
    <section class="section" id="section1">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">AMBER RUBIO CALDERON</div>
        
        <div class="canvas-wrapper" id="wrapper1">
            <canvas id="canvas1"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active" data-canvas="1" data-mode="bw"></div>
                <div class="mode-btn gradient" data-canvas="1" data-mode="gradient"></div>
                <div class="mode-btn warm" data-canvas="1" data-mode="warm"></div>
                <div class="mode-btn cool" data-canvas="1" data-mode="cool"></div>
                <div class="mode-btn matrix" data-canvas="1" data-mode="matrix"></div>
            </div>
            
            <div class="canvas-controls">
                <button class="ctrl-btn" data-canvas="1" data-action="out">−</button>
                <span class="zoom-text" id="zoom1">100%</span>
                <button class="ctrl-btn" data-canvas="1" data-action="in">+</button>
                <button class="ctrl-btn" data-canvas="1" data-action="reset">↺</button>
            </div>
        </div>
        
        <div class="scroll-indicator">
            <span>SCROLL</span>
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!-- Section 2: ENK ONK ENKS -->
    <section class="section" id="section2">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">ENK ONK ENKS</div>
        
        <div class="canvas-wrapper" id="wrapper2">
            <canvas id="canvas2"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active" data-canvas="2" data-mode="bw"></div>
                <div class="mode-btn gradient" data-canvas="2" data-mode="gradient"></div>
                <div class="mode-btn warm" data-canvas="2" data-mode="warm"></div>
                <div class="mode-btn cool" data-canvas="2" data-mode="cool"></div>
                <div class="mode-btn matrix" data-canvas="2" data-mode="matrix"></div>
            </div>
            
            <div class="canvas-controls">
                <button class="ctrl-btn" data-canvas="2" data-action="out">−</button>
                <span class="zoom-text" id="zoom2">100%</span>
                <button class="ctrl-btn" data-canvas="2" data-action="in">+</button>
                <button class="ctrl-btn" data-canvas="2" data-action="reset">↺</button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        TEXT PORTRAIT ART — MADE WITH LOVE
    </footer>

    <!-- Hidden Images -->
    <div class="hidden-images">
        <img id="img1" src="img 1.jpg" crossorigin="anonymous">
        <img id="img2" src="img 2.jpg" crossorigin="anonymous">
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const PORTRAITS = [
            { id: 1, text: 'AMBER RUBIO CALDERON ', imgId: 'img1' },
            { id: 2, text: 'enk onk enks ', imgId: 'img2' }
        ];

        const CONFIG = {
            fontSize: 8,
            resolution: 150,
            minZoom: 0.3,
            maxZoom: 12,
            particleCount: 60
        };

        // ============================================
        // STATE FOR EACH CANVAS
        // ============================================
        const canvasState = {};

        // ============================================
        // PARTICLES
        // ============================================
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');

        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = document.body.scrollHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > particleCanvas.width ||
                    this.y < 0 || this.y > particleCanvas.height) {
                    this.reset();
                }
            }

            draw() {
                particleCtx.beginPath();
                particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `rgba(102, 126, 234, ${this.opacity})`;
                particleCtx.fill();
            }
        }

        const particles = Array.from({ length: CONFIG.particleCount }, () => new Particle());

        function animateParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // ============================================
        // COLOR MODES
        // ============================================
        function getColor(gray, mode) {
            switch (mode) {
                case 'bw':
                    return `rgb(${gray}, ${gray}, ${gray})`;
                case 'gradient':
                    const hue = (gray / 255) * 60 + 240;
                    return `hsl(${hue}, 70%, ${20 + (gray / 255) * 60}%)`;
                case 'warm':
                    return `rgb(${Math.min(255, gray + 80)}, ${Math.floor(gray * 0.6)}, ${Math.floor(gray * 0.3)})`;
                case 'cool':
                    return `rgb(${Math.floor(gray * 0.3)}, ${Math.floor(gray * 0.7)}, ${Math.min(255, gray + 50)})`;
                case 'matrix':
                    return `rgb(0, ${gray}, 0)`;
                default:
                    return `rgb(${gray}, ${gray}, ${gray})`;
            }
        }

        // ============================================
        // CANVAS SETUP & RENDERING
        // ============================================
        function setupCanvas(portrait) {
            const canvas = document.getElementById(`canvas${portrait.id}`);
            const wrapper = document.getElementById(`wrapper${portrait.id}`);
            const ctx = canvas.getContext('2d');
            const img = document.getElementById(portrait.imgId);

            const state = {
                canvas,
                ctx,
                wrapper,
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                dragStart: { x: 0, y: 0 },
                colorMode: 'bw',
                textGrid: [],
                gridWidth: 0,
                gridHeight: 0,
                text: portrait.text,
                loaded: false
            };

            canvasState[portrait.id] = state;

            function resizeCanvas() {
                canvas.width = wrapper.clientWidth;
                canvas.height = wrapper.clientHeight;
                if (state.loaded) render(portrait.id);
            }

            function processImage() {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                const ratio = img.height / img.width;
                const width = CONFIG.resolution;
                const height = Math.floor(CONFIG.resolution * ratio * 0.55);

                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.drawImage(img, 0, 0, width, height);

                const imageData = tempCtx.getImageData(0, 0, width, height);
                state.gridWidth = width;
                state.gridHeight = height;

                state.textGrid = [];
                let textIndex = 0;

                for (let y = 0; y < height; y++) {
                    const row = [];
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        const r = imageData.data[i];
                        const g = imageData.data[i + 1];
                        const b = imageData.data[i + 2];
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                        row.push({
                            char: state.text[textIndex % state.text.length],
                            gray: gray
                        });
                        textIndex++;
                    }
                    state.textGrid.push(row);
                }

                // Center
                const artWidth = width * CONFIG.fontSize * 0.6;
                const artHeight = height * CONFIG.fontSize;
                state.offsetX = (canvas.width - artWidth) / 2;
                state.offsetY = (canvas.height - artHeight) / 2;

                state.loaded = true;
            }

            if (img.complete) {
                resizeCanvas();
                processImage();
                render(portrait.id);
            } else {
                img.onload = () => {
                    resizeCanvas();
                    processImage();
                    render(portrait.id);
                };
            }

            window.addEventListener('resize', resizeCanvas);

            // Events
            setupEvents(portrait.id);
        }

        function render(id) {
            const state = canvasState[id];
            if (!state || !state.loaded) return;

            const { ctx, canvas, scale, offsetX, offsetY, textGrid, gridWidth, gridHeight, colorMode } = state;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            const fontSize = CONFIG.fontSize;
            ctx.font = `${fontSize}px "Space Mono", monospace`;
            ctx.textBaseline = 'top';

            const charWidth = fontSize * 0.6;

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const cell = textGrid[y][x];
                    ctx.fillStyle = getColor(cell.gray, colorMode);
                    ctx.fillText(cell.char, x * charWidth, y * fontSize);
                }
            }

            ctx.restore();

            // Update zoom display
            document.getElementById(`zoom${id}`).textContent = `${Math.round(scale * 100)}%`;
        }

        // ============================================
        // EVENTS
        // ============================================
        function setupEvents(id) {
            const state = canvasState[id];
            const { canvas, wrapper } = state;

            // Wheel zoom
            wrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const worldX = (mouseX - state.offsetX) / state.scale;
                const worldY = (mouseY - state.offsetY) / state.scale;

                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * delta));

                state.offsetX = mouseX - worldX * state.scale;
                state.offsetY = mouseY - worldY * state.scale;

                render(id);
            });

            // Pan
            wrapper.addEventListener('mousedown', (e) => {
                state.isDragging = true;
                state.dragStart.x = e.clientX - state.offsetX;
                state.dragStart.y = e.clientY - state.offsetY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                state.offsetX = e.clientX - state.dragStart.x;
                state.offsetY = e.clientY - state.dragStart.y;
                render(id);
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
            });

            // Touch
            let lastTouchDist = 0;

            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.dragStart.x = e.touches[0].clientX - state.offsetX;
                    state.dragStart.y = e.touches[0].clientY - state.offsetY;
                } else if (e.touches.length === 2) {
                    lastTouchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });

            wrapper.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && state.isDragging) {
                    state.offsetX = e.touches[0].clientX - state.dragStart.x;
                    state.offsetY = e.touches[0].clientY - state.dragStart.y;
                    render(id);
                } else if (e.touches.length === 2 && lastTouchDist > 0) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * (dist / lastTouchDist)));
                    lastTouchDist = dist;
                    render(id);
                }
            });

            wrapper.addEventListener('touchend', () => {
                state.isDragging = false;
                lastTouchDist = 0;
            });
        }

        // ============================================
        // BUTTON CONTROLS
        // ============================================
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.canvas);
                const action = btn.dataset.action;
                const state = canvasState[id];

                if (action === 'in') {
                    state.scale = Math.min(CONFIG.maxZoom, state.scale * 1.3);
                } else if (action === 'out') {
                    state.scale = Math.max(CONFIG.minZoom, state.scale / 1.3);
                } else if (action === 'reset') {
                    state.scale = 1;
                    const artWidth = state.gridWidth * CONFIG.fontSize * 0.6;
                    const artHeight = state.gridHeight * CONFIG.fontSize;
                    state.offsetX = (state.canvas.width - artWidth) / 2;
                    state.offsetY = (state.canvas.height - artHeight) / 2;
                }

                render(id);
            });
        });

        // Color mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.canvas);
                const mode = btn.dataset.mode;

                // Update active state
                document.querySelectorAll(`.mode-btn[data-canvas="${id}"]`).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                canvasState[id].colorMode = mode;
                render(id);
            });
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        const loader = document.getElementById('loader');
        const loaderProgress = document.getElementById('loaderProgress');
        let loadedCount = 0;

        function checkAllLoaded() {
            loadedCount++;
            loaderProgress.style.width = `${(loadedCount / PORTRAITS.length) * 100}%`;

            if (loadedCount >= PORTRAITS.length) {
                setTimeout(() => {
                    loader.classList.add('hidden');
                    document.querySelector('.nav').classList.add('visible');
                }, 300);
            }
        }

        // Initialize
        resizeParticleCanvas();
        animateParticles();

        PORTRAITS.forEach(portrait => {
            const img = document.getElementById(portrait.imgId);
            if (img.complete) {
                setupCanvas(portrait);
                checkAllLoaded();
            } else {
                img.onload = () => {
                    setupCanvas(portrait);
                    checkAllLoaded();
                };
            }
        });

        window.addEventListener('resize', resizeParticleCanvas);
    </script>
</body>
</html>
