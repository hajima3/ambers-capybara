<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBER RUBIO CALDERON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #333;
        }

        .controls button {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .controls button:hover {
            background: #444;
            border-color: #666;
        }

        .zoom-level {
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.9rem;
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.85rem;
            z-index: 100;
            text-align: center;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #text-art {
            white-space: pre;
            font-family: 'Courier New', monospace;
            font-size: 4px;
            line-height: 4px;
            letter-spacing: 0px;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            user-select: none;
        }

        #hidden-canvas, #source-img {
            display: none;
        }

        .loading {
            color: #fff;
            font-size: 1.5rem;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="zoom-out">-</button>
        <span class="zoom-level">Zoom: <span id="zoom-value">100</span>%</span>
        <button id="zoom-in">+</button>
        <button id="reset">Reset</button>
    </div>

    <div class="instructions">
        Scroll to zoom | Drag to pan | Made for Amber Rubio Calderon
    </div>

    <div id="canvas-container">
        <div id="text-art"></div>
    </div>

    <img id="source-img" src="img 1.jpg" crossorigin="anonymous">
    <canvas id="hidden-canvas"></canvas>

    <div class="loading" id="loading">Loading...</div>

    <script>
        const text = "AMBER RUBIO CALDERON ";
        const img = document.getElementById('source-img');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const textArt = document.getElementById('text-art');
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const zoomValue = document.getElementById('zoom-value');

        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        img.onload = function() {
            // Set canvas size based on image
            const maxWidth = 200; // characters width
            const ratio = img.height / img.width;
            const width = maxWidth;
            const height = Math.floor(maxWidth * ratio * 0.5); // 0.5 because chars are taller than wide

            canvas.width = width;
            canvas.height = height;

            // Draw image to canvas
            ctx.drawImage(img, 0, 0, width, height);

            // Get image data
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            // Convert to text
            let result = '';
            let textIndex = 0;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = pixels[i];
                    const g = pixels[i + 1];
                    const b = pixels[i + 2];
                    
                    // Convert to grayscale
                    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    // Map brightness to character visibility
                    const brightness = gray / 255;
                    
                    // Get next character from our text
                    const char = text[textIndex % text.length];
                    textIndex++;
                    
                    // Create colored span based on brightness
                    const grayColor = Math.floor(gray);
                    result += `<span style="color: rgb(${grayColor},${grayColor},${grayColor})">${char}</span>`;
                }
                result += '\n';
            }

            textArt.innerHTML = result;
            loading.style.display = 'none';
        };

        // Zoom controls
        function updateTransform() {
            textArt.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            zoomValue.textContent = Math.round(scale * 100);
        }

        document.getElementById('zoom-in').addEventListener('click', () => {
            scale = Math.min(scale * 1.2, 20);
            updateTransform();
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            scale = Math.max(scale / 1.2, 0.5);
            updateTransform();
        });

        document.getElementById('reset').addEventListener('click', () => {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        });

        // Mouse wheel zoom
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.min(Math.max(scale * delta, 0.5), 20);
            updateTransform();
        });

        // Pan functionality
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch support
        let lastTouchDistance = 0;

        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            } else if (e.touches.length === 2) {
                lastTouchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        });

        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            } else if (e.touches.length === 2) {
                const distance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                if (lastTouchDistance > 0) {
                    scale = Math.min(Math.max(scale * (distance / lastTouchDistance), 0.5), 20);
                    updateTransform();
                }
                lastTouchDistance = distance;
            }
        });

        container.addEventListener('touchend', () => {
            isDragging = false;
            lastTouchDistance = 0;
        });
    </script>
</body>
</html>
