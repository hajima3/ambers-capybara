<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBER RUBIO CALDERON</title>
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Core Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #667eea;
            --secondary: #f093fb;
            --accent: #00c6ff;
            --dark: #0a0a0f;
            --glow-primary: rgba(102, 126, 234, 0.5);
            --glow-secondary: rgba(240, 147, 251, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html.lenis {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        body {
            background: var(--dark);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease, border-color 0.3s ease;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--secondary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor.hover {
            transform: scale(2);
            border-color: var(--secondary);
            background: rgba(240, 147, 251, 0.1);
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader-text {
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 6px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 3D Background Canvas */
        #threejs-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
        }

        /* Click Effect Canvas */
        #clickCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9998;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,15,1) 0%, transparent 100%);
            opacity: 0;
            transform: translateY(-20px);
        }

        .nav.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .logo {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #fff;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--secondary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .sound-toggle:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--glow-primary);
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* Sections */
        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #444;
            margin-bottom: 15px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(30px);
        }

        .section-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 4px;
            opacity: 0;
            transform: translateY(30px);
        }

        .section:nth-child(3) .section-name {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Canvas containers */
        .canvas-wrapper {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 60vh;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0,0,0,0.5);
            cursor: grab;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.1);
            opacity: 0;
            transform: translateY(50px) rotateX(10deg);
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: box-shadow 0.3s ease, transform 0.1s ease;
        }

        .canvas-wrapper:hover {
            box-shadow: 0 0 80px rgba(102, 126, 234, 0.2), 0 0 120px rgba(240, 147, 251, 0.1);
        }

        .canvas-wrapper:active {
            cursor: grabbing;
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Magnetic Buttons */
        .magnetic-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Controls */
        .canvas-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 10px 18px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .ctrl-btn:hover {
            transform: scale(1.15) translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .ctrl-btn:hover::before {
            opacity: 0.2;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn span {
            position: relative;
            z-index: 1;
        }

        .zoom-text {
            color: #888;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            padding: 0 12px;
            min-width: 70px;
            justify-content: center;
        }

        /* Color Modes */
        .mode-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
            max-width: 200px;
            justify-content: flex-end;
        }

        .mode-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid transparent;
            position: relative;
        }

        .mode-btn::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: inherit;
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .mode-btn:hover {
            transform: scale(1.3) translateY(-3px);
        }

        .mode-btn:hover::after {
            opacity: 0.5;
        }

        .mode-btn.active {
            border-color: #fff;
            box-shadow: 0 0 20px currentColor;
            transform: scale(1.1);
        }

        .mode-btn.bw { background: linear-gradient(135deg, #666, #fff); }
        .mode-btn.gradient { background: linear-gradient(135deg, #667eea, #f093fb); }
        .mode-btn.warm { background: linear-gradient(135deg, #f5af19, #f12711); }
        .mode-btn.cool { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .mode-btn.matrix { background: linear-gradient(135deg, #003300, #00ff00); }
        .mode-btn.sunset { background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3); }
        .mode-btn.ocean { background: linear-gradient(135deg, #0abdc6, #133e7c, #1e3799); }
        .mode-btn.neon { background: linear-gradient(135deg, #f706cf, #00fff0); }
        .mode-btn.sepia { background: linear-gradient(135deg, #704214, #c4a35a); }
        .mode-btn.cyber { background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff); }
        .mode-btn.forest { background: linear-gradient(135deg, #134e5e, #71b280); }
        .mode-btn.fire { background: linear-gradient(135deg, #f12711, #f5af19, #f12711); }
        .mode-btn.ice { background: linear-gradient(135deg, #83a4d4, #b6fbff); }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .scroll-indicator:hover {
            opacity: 0.7;
        }

        .scroll-indicator span {
            color: #444;
            font-size: 0.6rem;
            letter-spacing: 3px;
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 2px solid #444;
            border-bottom: 2px solid #444;
            transform: rotate(45deg);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes bounce {
            0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: 0.5; }
            50% { transform: rotate(45deg) translate(3px, 3px); opacity: 1; }
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.4) 0%, transparent 70%);
            transform: scale(0);
            animation: ripple 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Footer */
        .footer {
            padding: 60px 40px;
            text-align: center;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
        }

        .footer-content {
            opacity: 0;
            transform: translateY(20px);
        }

        /* Hidden */
        .hidden-images {
            display: none;
        }

        /* Glow Lines */
        .glow-line {
            position: fixed;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            opacity: 0.3;
            z-index: 2;
            pointer-events: none;
        }

        .glow-line-1 {
            top: 20%;
            left: 0;
            right: 0;
            animation: glowMove 8s ease-in-out infinite;
        }

        .glow-line-2 {
            top: 80%;
            left: 0;
            right: 0;
            animation: glowMove 8s ease-in-out infinite reverse;
        }

        @keyframes glowMove {
            0%, 100% { opacity: 0.1; transform: scaleX(0.5); }
            50% { opacity: 0.4; transform: scaleX(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 15px 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .section-name {
                font-size: 1.5rem;
            }
            
            .canvas-wrapper {
                height: 50vh;
            }

            .cursor, .cursor-dot {
                display: none;
            }

            body {
                cursor: auto;
            }

            .sound-toggle {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
        }

        /* Page Transition Overlay */
        .page-transition {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            transform: translateY(100%);
            pointer-events: none;
        }

        /* Grain overlay for cinematic effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9997;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <!-- Page Transition -->
    <div class="page-transition"></div>

    <!-- Grain Overlay -->
    <div class="grain"></div>

    <!-- Glow Lines -->
    <div class="glow-line glow-line-1"></div>
    <div class="glow-line glow-line-2"></div>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">LOADING EXPERIENCE</div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <!-- 3D Background -->
    <canvas id="threejs-canvas"></canvas>

    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Click Effect Canvas -->
    <canvas id="clickCanvas"></canvas>

    <!-- Sound Toggle -->
    <button class="sound-toggle magnetic-btn" id="soundToggle" title="Toggle Sound">
        🔊
    </button>

    <!-- Navigation -->
    <nav class="nav">
        <div class="logo magnetic-btn"><span>AMBER</span> RUBIO CALDERON</div>
        <div class="nav-links">
            <a href="#section1" class="magnetic-btn">PORTRAIT 1</a>
            <a href="#section2" class="magnetic-btn">PORTRAIT 2</a>
        </div>
    </nav>

    <!-- Section 1: AMBER RUBIO CALDERON -->
    <section class="section" id="section1">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">AMBER RUBIO CALDERON</div>
        
        <div class="canvas-wrapper" id="wrapper1">
            <canvas id="canvas1"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active magnetic-btn" data-canvas="1" data-mode="bw" title="Black & White"></div>
                <div class="mode-btn gradient magnetic-btn" data-canvas="1" data-mode="gradient" title="Gradient"></div>
                <div class="mode-btn warm magnetic-btn" data-canvas="1" data-mode="warm" title="Warm"></div>
                <div class="mode-btn cool magnetic-btn" data-canvas="1" data-mode="cool" title="Cool"></div>
                <div class="mode-btn matrix magnetic-btn" data-canvas="1" data-mode="matrix" title="Matrix"></div>
                <div class="mode-btn sunset magnetic-btn" data-canvas="1" data-mode="sunset" title="Sunset"></div>
                <div class="mode-btn ocean magnetic-btn" data-canvas="1" data-mode="ocean" title="Ocean"></div>
                <div class="mode-btn neon magnetic-btn" data-canvas="1" data-mode="neon" title="Neon"></div>
                <div class="mode-btn sepia magnetic-btn" data-canvas="1" data-mode="sepia" title="Sepia"></div>
                <div class="mode-btn cyber magnetic-btn" data-canvas="1" data-mode="cyber" title="Cyber"></div>
                <div class="mode-btn forest magnetic-btn" data-canvas="1" data-mode="forest" title="Forest"></div>
                <div class="mode-btn fire magnetic-btn" data-canvas="1" data-mode="fire" title="Fire"></div>
                <div class="mode-btn ice magnetic-btn" data-canvas="1" data-mode="ice" title="Ice"></div>
            </div>
            
            <div class="canvas-controls">
                <button class="ctrl-btn magnetic-btn" data-canvas="1" data-action="out"><span>−</span></button>
                <span class="zoom-text" id="zoom1">100%</span>
                <button class="ctrl-btn magnetic-btn" data-canvas="1" data-action="in"><span>+</span></button>

        </div>
        
        <div class="scroll-indicator" onclick="document.getElementById('section2').scrollIntoView()">

    <!-- Section 2: ENK ONK ENKS -->
    <section class="section" id="section2">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">ENK ONK ENKS</div>
        
        <div class="canvas-wrapper" id="wrapper2">
            <canvas id="canvas2"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active magnetic-btn" data-canvas="2" data-mode="bw" title="Black & White"></div>
                <div class="mode-btn gradient magnetic-btn" data-canvas="2" data-mode="gradient" title="Gradient"></div>
                <div class="mode-btn warm magnetic-btn" data-canvas="2" data-mode="warm" title="Warm"></div>
                <div class="mode-btn cool magnetic-btn" data-canvas="2" data-mode="cool" title="Cool"></div>
                <div class="mode-btn matrix magnetic-btn" data-canvas="2" data-mode="matrix" title="Matrix"></div>
                <div class="mode-btn sunset magnetic-btn" data-canvas="2" data-mode="sunset" title="Sunset"></div>
                <div class="mode-btn ocean magnetic-btn" data-canvas="2" data-mode="ocean" title="Ocean"></div>
                <div class="mode-btn neon magnetic-btn" data-canvas="2" data-mode="neon" title="Neon"></div>
                <div class="mode-btn sepia magnetic-btn" data-canvas="2" data-mode="sepia" title="Sepia"></div>
                <div class="mode-btn cyber magnetic-btn" data-canvas="2" data-mode="cyber" title="Cyber"></div>
                <div class="mode-btn forest magnetic-btn" data-canvas="2" data-mode="forest" title="Forest"></div>
                <div class="mode-btn fire magnetic-btn" data-canvas="2" data-mode="fire" title="Fire"></div>
                <div class="mode-btn ice magnetic-btn" data-canvas="2" data-mode="ice" title="Ice"></div>
            </div>
            
            <div class="canvas-controls">
                <button class="ctrl-btn magnetic-btn" data-canvas="2" data-action="out"><span>−</span></button>
                <span class="zoom-text" id="zoom2">100%</span>
                <button class="ctrl-btn magnetic-btn" data-canvas="2" data-action="in"><span>+</span></button>
                <button class="ctrl-btn magnetic-btn" data-canvas="2" data-action="reset"><span>↺</span></button>
            </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            TEXT PORTRAIT ART — CRAFTED WITH LOVE ♥
        </div>
    </footer>

    <!-- Hidden Images -->
    <div class="hidden-images">
        <img id="img1" src="img1.png">
        <img id="img2" src="img2.jpg">
    </div>

    <script>
        // ============================================
        // SMOOTH SCROLL (LENIS)
        // ============================================
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Connect GSAP ScrollTrigger to Lenis
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);

        // ============================================
        // SOUND EFFECTS (HOWLER.JS)
        // ============================================
        let soundEnabled = false;

        const sounds = {
            hover: new Howl({
                src: ['https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'],
                volume: 0.1,
                preload: true

        // ============================================
        // COLOR MODES
        // ============================================
        function getColor(gray, mode) {
            const n = gray / 255;
            switch (mode) {
                case 'bw':
                    return `rgb(${gray}, ${gray}, ${gray})`;
                case 'gradient':
                    const hue = n * 60 + 240;
                    return `hsl(${hue}, 70%, ${20 + n * 60}%)`;
                case 'warm':
                    return `rgb(${Math.min(255, gray + 80)}, ${Math.floor(gray * 0.6)}, ${Math.floor(gray * 0.3)})`;
                case 'cool':
                    return `rgb(${Math.floor(gray * 0.3)}, ${Math.floor(gray * 0.7)}, ${Math.min(255, gray + 50)})`;
                case 'matrix':
                    return `rgb(0, ${gray}, 0)`;
                case 'sunset':
                    return `rgb(${Math.min(255, 255 - gray * 0.3)}, ${Math.floor(100 + n * 100)}, ${Math.floor(n * 200 + 50)})`;
                case 'ocean':
                    return `rgb(${Math.floor(n * 50)}, ${Math.floor(80 + n * 100)}, ${Math.min(255, 150 + gray * 0.5)})`;
                case 'neon':
                    const neonHue = (n * 180 + 280) % 360;
                    return `hsl(${neonHue}, 100%, ${30 + n * 40}%)`;
                case 'sepia':
                    return `rgb(${Math.min(255, gray + 50)}, ${Math.floor(gray * 0.85 + 30)}, ${Math.floor(gray * 0.6)})`;
                case 'cyber':
                    const cyberHue = n * 60 + (n > 0.5 ? 180 : 300);
                    return `hsl(${cyberHue}, 90%, ${25 + n * 50}%)`;
                case 'forest':
                    return `rgb(${Math.floor(30 + n * 60)}, ${Math.floor(80 + n * 120)}, ${Math.floor(50 + n * 80)})`;
                case 'fire':
                    return `rgb(${Math.min(255, 180 + gray * 0.3)}, ${Math.floor(n * 180)}, ${Math.floor(n * 50)})`;
                case 'ice':
                    return `rgb(${Math.floor(180 + n * 75)}, ${Math.floor(200 + n * 55)}, ${Math.min(255, 220 + gray * 0.15)})`;
                default:
                    return `rgb(${gray}, ${gray}, ${gray})`;
            }
        }

        // ============================================
        // CANVAS SETUP & RENDERING
        // ============================================
        function setupCanvas(portrait) {
            const canvas = document.getElementById(`canvas${portrait.id}`);
            const wrapper = document.getElementById(`wrapper${portrait.id}`);
            const ctx = canvas.getContext('2d');
            const img = document.getElementById(portrait.imgId);

            const state = {
                canvas,
                ctx,
                wrapper,
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                dragStart: { x: 0, y: 0 },
                colorMode: 'bw',
                textGrid: [],
                gridWidth: 0,
                gridHeight: 0,
                text: portrait.text,
                loaded: false
            };

            canvasState[portrait.id] = state;

            function resizeCanvas() {
                canvas.width = wrapper.clientWidth;
                canvas.height = wrapper.clientHeight;
                if (state.loaded) render(portrait.id);
            }

            function processImage() {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                const ratio = img.height / img.width;
                const width = CONFIG.resolution;
                const height = Math.floor(CONFIG.resolution * ratio * 0.55);

                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.drawImage(img, 0, 0, width, height);

                const imageData = tempCtx.getImageData(0, 0, width, height);
                state.gridWidth = width;
                state.gridHeight = height;

                state.textGrid = [];
                let textIndex = 0;

                for (let y = 0; y < height; y++) {
                    const row = [];
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        const r = imageData.data[i];
                        const g = imageData.data[i + 1];
                        const b = imageData.data[i + 2];
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                        row.push({
                            char: state.text[textIndex % state.text.length],
                            gray: gray
                        });
                        textIndex++;
                    }
                    state.textGrid.push(row);
                }

                const artWidth = width * CONFIG.fontSize * 0.6;
                const artHeight = height * CONFIG.fontSize;
                state.offsetX = (canvas.width - artWidth) / 2;
                state.offsetY = (canvas.height - artHeight) / 2;

                state.loaded = true;
            }

            if (img.complete) {
                resizeCanvas();
                processImage();
                render(portrait.id);
            } else {
                img.onload = () => {
                    resizeCanvas();
                    processImage();
                    render(portrait.id);
                };
            }

            window.addEventListener('resize', resizeCanvas);
            setupEvents(portrait.id);
        }

        function render(id) {
            const state = canvasState[id];
            if (!state || !state.loaded) return;

            const { ctx, canvas, scale, offsetX, offsetY, textGrid, gridWidth, gridHeight, colorMode } = state;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            const fontSize = CONFIG.fontSize;
            ctx.font = `${fontSize}px "Space Mono", monospace`;
            ctx.textBaseline = 'top';

            const charWidth = fontSize * 0.6;

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const cell = textGrid[y][x];
                    ctx.fillStyle = getColor(cell.gray, colorMode);
                    ctx.fillText(cell.char, x * charWidth, y * fontSize);
                }
            }

            ctx.restore();
            document.getElementById(`zoom${id}`).textContent = `${Math.round(scale * 100)}%`;
        }

        // ============================================
        // EVENTS
        // ============================================
        function setupEvents(id) {
            const state = canvasState[id];
            const { canvas, wrapper } = state;

            wrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const worldX = (mouseX - state.offsetX) / state.scale;
                const worldY = (mouseY - state.offsetY) / state.scale;

                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * delta));

                state.offsetX = mouseX - worldX * state.scale;
                state.offsetY = mouseY - worldY * state.scale;

                playSound('whoosh');
                render(id);
            }, { passive: false });

            wrapper.addEventListener('mousedown', (e) => {
                state.isDragging = true;
                state.dragStart.x = e.clientX - state.offsetX;
                state.dragStart.y = e.clientY - state.offsetY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                state.offsetX = e.clientX - state.dragStart.x;
                state.offsetY = e.clientY - state.dragStart.y;
                render(id);
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
            });

            let lastTouchDist = 0;

            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.dragStart.x = e.touches[0].clientX - state.offsetX;
                    state.dragStart.y = e.touches[0].clientY - state.offsetY;
                } else if (e.touches.length === 2) {
                    lastTouchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });

            wrapper.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && state.isDragging) {
                    state.offsetX = e.touches[0].clientX - state.dragStart.x;
                    state.offsetY = e.touches[0].clientY - state.dragStart.y;
                    render(id);
                } else if (e.touches.length === 2 && lastTouchDist > 0) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * (dist / lastTouchDist)));
                    lastTouchDist = dist;
                    render(id);
                }
            }, { passive: false });

            wrapper.addEventListener('touchend', () => {
                state.isDragging = false;
                lastTouchDist = 0;
            });
        }

            leftEar.position.set(3, 2.3, 1.2);
            capybaraGroup.add(leftEar);

            const rightEar = new THREE.Mesh(earGeom, darkMaterial);
            rightEar.position.set(3, 2.3, -1.2);
            capybaraGroup.add(rightEar);

            // Legs
            const legGeom = new THREE.CylinderGeometry(0.4, 0.35, 2, 16);
            const legs = [];
            const legPositions = [
                { x: 2, z: 1.5 },
                { x: 2, z: -1.5 },
                { x: -2, z: 1.5 },
                { x: -2, z: -1.5 }
            ];

            legPositions.forEach((pos) => {
                const leg = new THREE.Mesh(legGeom, darkMaterial);
                leg.position.set(pos.x, -2.2, pos.z);
                legs.push(leg);
                capybaraGroup.add(leg);
            });

            // Position capybara
            capybaraGroup.position.x = -40;
            capybaraGroup.position.y = -10;
            capybaraGroup.scale.set(0.7, 0.7, 0.7);

            // Animation variables
            let runCycle = 0;
            let capybaraX = -40;
            const runSpeed = 0.1;

            // Mouse tracking
            let mouseX = 0;
            let mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // GSAP animations for lights
            gsap.to(pointLight1, {
                intensity: 2,
                duration: 2.5,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            gsap.to(pointLight2, {
                intensity: 1.5,
                duration: 3.5,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            gsap.to(pointLight1.position, {
                y: 30,
                duration: 4,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);

                runCycle += runSpeed;

                capybaraX += 0.04;
                if (capybaraX > 50) capybaraX = -40;
                capybaraGroup.position.x = capybaraX;

                capybaraGroup.position.y = -10 + Math.sin(runCycle * 2) * 0.4;
                capybaraGroup.rotation.z = Math.sin(runCycle * 2) * 0.04;

                legs.forEach((leg, i) => {
                    const offset = i < 2 ? 0 : Math.PI;
                    const sideOffset = i % 2 === 0 ? 0 : Math.PI;
                    leg.rotation.x = Math.sin(runCycle * 2 + offset + sideOffset * 0.5) * 0.6;
                    leg.position.y = -2.2 + Math.abs(Math.sin(runCycle * 2 + offset + sideOffset * 0.5)) * 0.4;
                });

                head.rotation.y = Math.sin(runCycle) * 0.12;
                head.position.y = 0.8 + Math.sin(runCycle * 2) * 0.12;

                leftEar.rotation.z = Math.sin(runCycle * 3) * 0.25;
                rightEar.rotation.z = -Math.sin(runCycle * 3) * 0.25;

                camera.position.x += (mouseX * 4 - camera.position.x) * 0.02;
                camera.position.y += (mouseY * 3 + 5 - camera.position.y) * 0.02;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                clickCanvas.width = window.innerWidth;
                clickCanvas.height = window.innerHeight;
            });
        })();

        // ============================================
        // INITIALIZATION
        // ============================================
        const loader = document.getElementById('loader');
        const loaderProgress = document.getElementById('loaderProgress');
        let loadedCount = 0;

        function hideLoader() {
            loader.style.transition = 'opacity 0.8s ease';
            loader.style.opacity = '0';
            setTimeout(() => { loader.classList.add('hidden'); }, 800);
            try { gsap.to('.nav', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }); } catch(e) {}
        }

        // Guaranteed fallback — hide loader after 5 seconds no matter what
        const loaderTimeout = setTimeout(hideLoader, 5000);

        function checkAllLoaded() {
            loadedCount++;
            loaderProgress.style.width = `${(loadedCount / PORTRAITS.length) * 100}%`;

            if (loadedCount >= PORTRAITS.length) {
                clearTimeout(loaderTimeout);
                loaderProgress.style.width = '100%';
                setTimeout(hideLoader, 500);
            }
        }

        // Initialize
        resizeParticleCanvas();
        animateParticles();

        PORTRAITS.forEach(portrait => {
            const img = document.getElementById(portrait.imgId);
            if (img.complete && img.naturalWidth > 0) {
                setupCanvas(portrait);
                checkAllLoaded();
            } else {
                img.onload = () => {
                    setupCanvas(portrait);
                    checkAllLoaded();
                };
                img.onerror = () => {
                    console.error('Failed to load:', portrait.imgId);
                    checkAllLoaded(); // Continue anyway
                };
            }
        });

        window.addEventListener('resize', resizeParticleCanvas);

        // Page visibility - pause audio when tab hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                sounds.ambient.pause();
            } else if (soundEnabled) {
                sounds.ambient.play();
            }
        });
    </script>
</body>
</html>
