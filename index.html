<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBER RUBIO CALDERON</title>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #0a0a0f;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-text {
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 6px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,15,1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .nav.visible {
            opacity: 1;
        }

        .logo {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #fff;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Sections */
        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            position: relative;
        }

        .section-title {
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #444;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .section-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 4px;
        }

        .section:nth-child(3) .section-name {
            background: linear-gradient(135deg, #00c6ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Canvas containers */
        .canvas-wrapper {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 60vh;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.5);
            cursor: grab;
        }

        .canvas-wrapper:active {
            cursor: grabbing;
        }

        .canvas-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Controls */
        .canvas-controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .zoom-text {
            color: #888;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            padding: 0 10px;
            min-width: 60px;
            justify-content: center;
        }

        /* Color Modes */
        .mode-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .mode-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .mode-btn:hover {
            transform: scale(1.2);
        }

        .mode-btn.active {
            border-color: #fff;
            box-shadow: 0 0 15px currentColor;
        }

        .mode-btn.bw { background: linear-gradient(135deg, #666, #fff); }
        .mode-btn.gradient { background: linear-gradient(135deg, #667eea, #f093fb); }
        .mode-btn.warm { background: linear-gradient(135deg, #f5af19, #f12711); }
        .mode-btn.cool { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .mode-btn.matrix { background: linear-gradient(135deg, #003300, #00ff00); }
        .mode-btn.sunset { background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3); }
        .mode-btn.ocean { background: linear-gradient(135deg, #0abdc6, #133e7c, #1e3799); }
        .mode-btn.neon { background: linear-gradient(135deg, #f706cf, #00fff0); }
        .mode-btn.sepia { background: linear-gradient(135deg, #704214, #c4a35a); }
        .mode-btn.cyber { background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff); }
        .mode-btn.forest { background: linear-gradient(135deg, #134e5e, #71b280); }
        .mode-btn.fire { background: linear-gradient(135deg, #f12711, #f5af19, #f12711); }
        .mode-btn.ice { background: linear-gradient(135deg, #83a4d4, #b6fbff); }

        /* 3D Background Canvas */
        #threejs-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .mode-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
            max-width: 180px;
            justify-content: flex-end;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-indicator span {
            color: #444;
            font-size: 0.6rem;
            letter-spacing: 3px;
        }

        .scroll-arrow {
            width: 20px;
            height: 20px;
            border-right: 2px solid #444;
            border-bottom: 2px solid #444;
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Footer */
        .footer {
            padding: 40px;
            text-align: center;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* Hidden */
        .hidden-images {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 15px 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .section-name {
                font-size: 1.5rem;
            }
            
            .canvas-wrapper {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">LOADING ARTWORK</div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <!-- 3D Background -->
    <canvas id="threejs-canvas"></canvas>

    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navigation -->
    <nav class="nav">
        <div class="logo"><span>AMBER</span> RUBIO CALDERON</div>
        <div class="nav-links">
            <a href="#section1">PORTRAIT 1</a>
            <a href="#section2">PORTRAIT 2</a>
        </div>
    </nav>

    <!-- Section 1: AMBER RUBIO CALDERON -->
    <section class="section" id="section1">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">AMBER RUBIO CALDERON</div>
        
        <div class="canvas-wrapper" id="wrapper1">
            <canvas id="canvas1"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active" data-canvas="1" data-mode="bw" title="Black & White"></div>
                <div class="mode-btn gradient" data-canvas="1" data-mode="gradient" title="Gradient"></div>
                <div class="mode-btn warm" data-canvas="1" data-mode="warm" title="Warm"></div>
                <div class="mode-btn cool" data-canvas="1" data-mode="cool" title="Cool"></div>
                <div class="mode-btn matrix" data-canvas="1" data-mode="matrix" title="Matrix"></div>

                <div class="mode-btn ocean" data-canvas="1" data-mode="ocean" title="Ocean"></div>
                <div class="mode-btn neon" data-canvas="1" data-mode="neon" title="Neon"></div>
                <div class="mode-btn sepia" data-canvas="1" data-mode="sepia" title="Sepia"></div>

    <!-- Section 2: ENK ONK ENKS -->
    <section class="section" id="section2">
        <div class="section-title">Text Portrait</div>
        <div class="section-name">ENK ONK ENKS</div>
        
        <div class="canvas-wrapper" id="wrapper2">
            <canvas id="canvas2"></canvas>
            
            <div class="mode-selector">
                <div class="mode-btn bw active" data-canvas="2" data-mode="bw" title="Black & White"></div>
                <div class="mode-btn gradient" data-canvas="2" data-mode="gradient" title="Gradient"></div>
                <div class="mode-btn warm" data-canvas="2" data-mode="warm" title="Warm"></div>
                <div class="mode-btn cool" data-canvas="2" data-mode="cool" title="Cool"></div>
                <div class="mode-btn matrix" data-canvas="2" data-mode="matrix" title="Matrix"></div>
                <div class="mode-btn sunset" data-canvas="2" data-mode="sunset" title="Sunset"></div>
                <div class="mode-btn ocean" data-canvas="2" data-mode="ocean" title="Ocean"></div>
                <div class="mode-btn neon" data-canvas="2" data-mode="neon" title="Neon"></div>
                <div class="mode-btn sepia" data-canvas="2" data-mode="sepia" title="Sepia"></div>
                <div class="mode-btn cyber" data-canvas="2" data-mode="cyber" title="Cyber"></div>

            <div class="canvas-controls">

    <!-- Footer -->
    <footer class="footer">
        TEXT PORTRAIT ART — MADE WITH LOVE
    </footer>

    <!-- Hidden Images -->
    <div class="hidden-images">
        <img id="img1" src="img 1.png" crossorigin="anonymous">
        <img id="img2" src="img 2.jpg" crossorigin="anonymous">
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const PORTRAITS = [
            { id: 1, text: 'AMBER RUBIO CALDERON ', imgId: 'img1' },
            { id: 2, text: 'enk onk enks ', imgId: 'img2' }
        ];

        const CONFIG = {
            fontSize: 8,
            resolution: 150,
            minZoom: 0.3,
            maxZoom: 12,
            particleCount: 60
        };

        // ============================================
        // STATE FOR EACH CANVAS
        // ============================================
        const canvasState = {};

        // ============================================
        // PARTICLES
        // ============================================
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');

        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = document.body.scrollHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > particleCanvas.width ||
                    this.y < 0 || this.y > particleCanvas.height) {
                    this.reset();
                }
            }

            draw() {
                particleCtx.beginPath();
                particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `rgba(102, 126, 234, ${this.opacity})`;
                particleCtx.fill();
            }
        }

        const particles = Array.from({ length: CONFIG.particleCount }, () => new Particle());

        function animateParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // ============================================
        // COLOR MODES
        // ============================================
        function getColor(gray, mode) {
            const n = gray / 255; // normalized 0-1
            switch (mode) {
                case 'bw':
                    return `rgb(${gray}, ${gray}, ${gray})`;
                case 'gradient':
                    const hue = n * 60 + 240;
                    return `hsl(${hue}, 70%, ${20 + n * 60}%)`;
                case 'warm':
                    return `rgb(${Math.min(255, gray + 80)}, ${Math.floor(gray * 0.6)}, ${Math.floor(gray * 0.3)})`;
                case 'cool':
                    return `rgb(${Math.floor(gray * 0.3)}, ${Math.floor(gray * 0.7)}, ${Math.min(255, gray + 50)})`;
                case 'matrix':
                    return `rgb(0, ${gray}, 0)`;
                case 'sunset':
                    return `rgb(${Math.min(255, 255 - gray * 0.3)}, ${Math.floor(100 + n * 100)}, ${Math.floor(n * 200 + 50)})`;
                case 'ocean':
                    return `rgb(${Math.floor(n * 50)}, ${Math.floor(80 + n * 100)}, ${Math.min(255, 150 + gray * 0.5)})`;
                case 'neon':
                    const neonHue = (n * 180 + 280) % 360;
                    return `hsl(${neonHue}, 100%, ${30 + n * 40}%)`;
                case 'sepia':
                    return `rgb(${Math.min(255, gray + 50)}, ${Math.floor(gray * 0.85 + 30)}, ${Math.floor(gray * 0.6)})`;
                case 'cyber':
                    const cyberHue = n * 60 + (n > 0.5 ? 180 : 300);
                    return `hsl(${cyberHue}, 90%, ${25 + n * 50}%)`;
                case 'forest':
                    return `rgb(${Math.floor(30 + n * 60)}, ${Math.floor(80 + n * 120)}, ${Math.floor(50 + n * 80)})`;
                case 'fire':
                    return `rgb(${Math.min(255, 180 + gray * 0.3)}, ${Math.floor(n * 180)}, ${Math.floor(n * 50)})`;
                case 'ice':
                    return `rgb(${Math.floor(180 + n * 75)}, ${Math.floor(200 + n * 55)}, ${Math.min(255, 220 + gray * 0.15)})`;
                default:
                    return `rgb(${gray}, ${gray}, ${gray})`;
            }
        }

        // ============================================
        // CANVAS SETUP & RENDERING
        // ============================================
        function setupCanvas(portrait) {
            const canvas = document.getElementById(`canvas${portrait.id}`);
            const wrapper = document.getElementById(`wrapper${portrait.id}`);
            const ctx = canvas.getContext('2d');
            const img = document.getElementById(portrait.imgId);

            const state = {
                canvas,
                ctx,
                wrapper,
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                dragStart: { x: 0, y: 0 },
                colorMode: 'bw',
                textGrid: [],
                gridWidth: 0,
                gridHeight: 0,
                text: portrait.text,
                loaded: false
            };

            canvasState[portrait.id] = state;

            function resizeCanvas() {
                canvas.width = wrapper.clientWidth;
                canvas.height = wrapper.clientHeight;
                if (state.loaded) render(portrait.id);
            }

            function processImage() {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                const ratio = img.height / img.width;
                const width = CONFIG.resolution;
                const height = Math.floor(CONFIG.resolution * ratio * 0.55);

                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.drawImage(img, 0, 0, width, height);

                const imageData = tempCtx.getImageData(0, 0, width, height);
                state.gridWidth = width;
                state.gridHeight = height;

                state.textGrid = [];
                let textIndex = 0;

                for (let y = 0; y < height; y++) {
                    const row = [];
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        const r = imageData.data[i];
                        const g = imageData.data[i + 1];
                        const b = imageData.data[i + 2];
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                        row.push({
                            char: state.text[textIndex % state.text.length],
                            gray: gray
                        });
                        textIndex++;
                    }
                    state.textGrid.push(row);
                }

                // Center
                const artWidth = width * CONFIG.fontSize * 0.6;
                const artHeight = height * CONFIG.fontSize;
                state.offsetX = (canvas.width - artWidth) / 2;
                state.offsetY = (canvas.height - artHeight) / 2;

                state.loaded = true;
            }

            if (img.complete) {
                resizeCanvas();
                processImage();
                render(portrait.id);
            } else {
                img.onload = () => {
                    resizeCanvas();
                    processImage();
                    render(portrait.id);
                };
            }

            window.addEventListener('resize', resizeCanvas);

            // Events
            setupEvents(portrait.id);
        }

        function render(id) {
            const state = canvasState[id];
            if (!state || !state.loaded) return;

            const { ctx, canvas, scale, offsetX, offsetY, textGrid, gridWidth, gridHeight, colorMode } = state;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            const fontSize = CONFIG.fontSize;
            ctx.font = `${fontSize}px "Space Mono", monospace`;
            ctx.textBaseline = 'top';

            const charWidth = fontSize * 0.6;

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    const cell = textGrid[y][x];
                    ctx.fillStyle = getColor(cell.gray, colorMode);
                    ctx.fillText(cell.char, x * charWidth, y * fontSize);
                }
            }

            ctx.restore();

            // Update zoom display
            document.getElementById(`zoom${id}`).textContent = `${Math.round(scale * 100)}%`;
        }

        // ============================================
        // EVENTS
        // ============================================
        function setupEvents(id) {
            const state = canvasState[id];
            const { canvas, wrapper } = state;

            // Wheel zoom
            wrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const worldX = (mouseX - state.offsetX) / state.scale;
                const worldY = (mouseY - state.offsetY) / state.scale;

                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * delta));

                state.offsetX = mouseX - worldX * state.scale;
                state.offsetY = mouseY - worldY * state.scale;

                render(id);
            });

            // Pan
            wrapper.addEventListener('mousedown', (e) => {
                state.isDragging = true;
                state.dragStart.x = e.clientX - state.offsetX;
                state.dragStart.y = e.clientY - state.offsetY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                state.offsetX = e.clientX - state.dragStart.x;
                state.offsetY = e.clientY - state.dragStart.y;
                render(id);
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
            });

            // Touch
            let lastTouchDist = 0;

            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.dragStart.x = e.touches[0].clientX - state.offsetX;
                    state.dragStart.y = e.touches[0].clientY - state.offsetY;
                } else if (e.touches.length === 2) {
                    lastTouchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });

            wrapper.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && state.isDragging) {
                    state.offsetX = e.touches[0].clientX - state.dragStart.x;
                    state.offsetY = e.touches[0].clientY - state.dragStart.y;
                    render(id);
                } else if (e.touches.length === 2 && lastTouchDist > 0) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    state.scale = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, state.scale * (dist / lastTouchDist)));
                    lastTouchDist = dist;
                    render(id);
                }
            });

            wrapper.addEventListener('touchend', () => {
                state.isDragging = false;
                lastTouchDist = 0;
            });
        }

        // ============================================
        // BUTTON CONTROLS
        // ============================================
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.canvas);
                const action = btn.dataset.action;
                const state = canvasState[id];

                if (action === 'in') {
                    state.scale = Math.min(CONFIG.maxZoom, state.scale * 1.3);
                } else if (action === 'out') {
                    state.scale = Math.max(CONFIG.minZoom, state.scale / 1.3);
                } else if (action === 'reset') {
                    state.scale = 1;
                    const artWidth = state.gridWidth * CONFIG.fontSize * 0.6;
                    const artHeight = state.gridHeight * CONFIG.fontSize;
                    state.offsetX = (state.canvas.width - artWidth) / 2;
                    state.offsetY = (state.canvas.height - artHeight) / 2;
                }

                render(id);
            });
        });

        // Color mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.canvas);
                const mode = btn.dataset.mode;

                // Update active state
                document.querySelectorAll(`.mode-btn[data-canvas="${id}"]`).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                canvasState[id].colorMode = mode;
                render(id);
            });
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        const loader = document.getElementById('loader');
        const loaderProgress = document.getElementById('loaderProgress');
        let loadedCount = 0;

        function checkAllLoaded() {
            loadedCount++;
            loaderProgress.style.width = `${(loadedCount / PORTRAITS.length) * 100}%`;

            if (loadedCount >= PORTRAITS.length) {
                setTimeout(() => {
                    loader.classList.add('hidden');
                    document.querySelector('.nav').classList.add('visible');
                }, 300);
            }
        }

        // Initialize
        resizeParticleCanvas();
        animateParticles();

        PORTRAITS.forEach(portrait => {
            const img = document.getElementById(portrait.imgId);
            if (img.complete) {
                setupCanvas(portrait);
                checkAllLoaded();
            } else {
                img.onload = () => {
                    setupCanvas(portrait);
                    checkAllLoaded();
                };
            }
        });

        window.addEventListener('resize', resizeParticleCanvas);

        // ============================================
        // THREE.JS 3D CAPYBARA ANIMATION
        // ============================================
        (function initThreeJS() {
            const threeCanvas = document.getElementById('threejs-canvas');
            
            // Scene setup
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            camera.position.y = 5;

            const renderer = new THREE.WebGLRenderer({ 
                canvas: threeCanvas, 
                alpha: true,
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x667eea, 0.4);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xf093fb, 1, 100);
            pointLight1.position.set(20, 20, 20);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00c6ff, 0.8, 100);
            pointLight2.position.set(-20, -10, 20);
            scene.add(pointLight2);

            // Capybara group
            const capybaraGroup = new THREE.Group();
            scene.add(capybaraGroup);

            // Materials
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8B6914,
                roughness: 0.8,
                metalness: 0.1
            });

            const darkMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x3d2e0a,
                roughness: 0.9
            });

            const eyeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x111111,
                roughness: 0.3
            });

            const noseMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2a1f0a,
                roughness: 0.5
            });

            // Body
            const bodyGeom = new THREE.SphereGeometry(3, 32, 32);
            bodyGeom.scale(1.4, 0.9, 1);
            const body = new THREE.Mesh(bodyGeom, bodyMaterial);
            capybaraGroup.add(body);

            // Head
            const headGeom = new THREE.SphereGeometry(1.8, 32, 32);
            headGeom.scale(1.2, 1, 1);
            const head = new THREE.Mesh(headGeom, bodyMaterial);
            head.position.set(3.5, 0.8, 0);
            capybaraGroup.add(head);

            // Snout
            const snoutGeom = new THREE.SphereGeometry(1, 24, 24);
            snoutGeom.scale(1.3, 0.8, 0.9);
            const snout = new THREE.Mesh(snoutGeom, bodyMaterial);
            snout.position.set(5, 0.3, 0);
            capybaraGroup.add(snout);

            // Nose
            const noseGeom = new THREE.SphereGeometry(0.4, 16, 16);
            noseGeom.scale(1.2, 0.8, 1);
            const nose = new THREE.Mesh(noseGeom, noseMaterial);
            nose.position.set(6, 0.5, 0);
            capybaraGroup.add(nose);

            // Eyes
            const eyeGeom = new THREE.SphereGeometry(0.25, 16, 16);
            const leftEye = new THREE.Mesh(eyeGeom, eyeMaterial);
            leftEye.position.set(4.5, 1.5, 1);
            capybaraGroup.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeom, eyeMaterial);
            rightEye.position.set(4.5, 1.5, -1);
            capybaraGroup.add(rightEye);

            // Ears
            const earGeom = new THREE.SphereGeometry(0.4, 16, 16);
            earGeom.scale(1, 0.6, 0.4);
            
            const leftEar = new THREE.Mesh(earGeom, darkMaterial);
            leftEar.position.set(3, 2.3, 1.2);
            capybaraGroup.add(leftEar);

            const rightEar = new THREE.Mesh(earGeom, darkMaterial);
            rightEar.position.set(3, 2.3, -1.2);
            capybaraGroup.add(rightEar);

            // Legs
            const legGeom = new THREE.CylinderGeometry(0.4, 0.35, 2, 16);
            const legs = [];
            const legPositions = [
                { x: 2, z: 1.5 },
                { x: 2, z: -1.5 },
                { x: -2, z: 1.5 },
                { x: -2, z: -1.5 }
            ];

            legPositions.forEach((pos, i) => {
                const leg = new THREE.Mesh(legGeom, darkMaterial);
                leg.position.set(pos.x, -2.2, pos.z);
                legs.push(leg);
                capybaraGroup.add(leg);
            });

            // Position capybara
            capybaraGroup.position.x = -40;
            capybaraGroup.position.y = -8;
            capybaraGroup.scale.set(0.8, 0.8, 0.8);

            // Animation variables
            let runCycle = 0;
            let capybaraX = -40;
            const runSpeed = 0.08;

            // Mouse tracking
            let mouseX = 0;
            let mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // GSAP entrance animation
            gsap.fromTo(capybaraGroup.position, 
                { x: -40 },
                { x: -25, duration: 2, ease: 'power2.out', delay: 1 }
            );

            gsap.to(pointLight1, {
                intensity: 1.5,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            gsap.to(pointLight2, {
                intensity: 1.2,
                duration: 3,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);

                runCycle += runSpeed;

                // Running animation
                capybaraX += 0.03;
                if (capybaraX > 50) capybaraX = -40;
                capybaraGroup.position.x = capybaraX;

                // Body bob
                capybaraGroup.position.y = -8 + Math.sin(runCycle * 2) * 0.3;
                capybaraGroup.rotation.z = Math.sin(runCycle * 2) * 0.03;

                // Leg animation (running)
                legs.forEach((leg, i) => {
                    const offset = i < 2 ? 0 : Math.PI; // Front vs back legs
                    const sideOffset = i % 2 === 0 ? 0 : Math.PI; // Left vs right
                    leg.rotation.x = Math.sin(runCycle * 2 + offset + sideOffset * 0.5) * 0.5;
                    leg.position.y = -2.2 + Math.abs(Math.sin(runCycle * 2 + offset + sideOffset * 0.5)) * 0.3;
                });

                // Head slight movement
                head.rotation.y = Math.sin(runCycle) * 0.1;
                head.position.y = 0.8 + Math.sin(runCycle * 2) * 0.1;

                // Ear wiggle
                leftEar.rotation.z = Math.sin(runCycle * 3) * 0.2;
                rightEar.rotation.z = -Math.sin(runCycle * 3) * 0.2;

                // Camera subtle movement based on mouse
                camera.position.x += (mouseX * 3 - camera.position.x) * 0.02;
                camera.position.y += (mouseY * 2 + 5 - camera.position.y) * 0.02;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }

            animate();

            // Resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
